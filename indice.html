<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>diseño porfolio</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #736CFF; 
        font-family: "Times New Roman", serif;
    }

    .contenedor {
        display: flex;
        height: 100vh;
        width: 100%;
    }

    .col-izquierda {
        width: 200px; 
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
        padding: 20px 0;
    }

    .col-derecha-lateral {
        width: 200px;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-around;
        padding: 20px 0;
    }

    .circulo {
        width: 200px;
        height: 200px;
        background: black;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 13px;
        text-align: center;
        font-family: serif;
    }

    .circulo a {
        color: white;
        text-decoration: none;
    }

    .circulo a:hover {
        text-decoration: underline;
    }

    .col-derecha {
        height: 100%;
        width: 100%;
        background: #6F67FF;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .circulo-central {
        width: 330px;
        height: 330px;
        background: #736CFF;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        text-align: center;
        font-size: 14px;
        box-shadow: 0 0 40px white;
    }

    .circulo-central h2 {
        margin: 0;
        font-size: 16px;
        font-weight: bold;
    }

    .circulo-central p {
        margin: 4px 0 0 0;
        font-size: 12px;
    }
</style>

</head>
<body>

<div class="contenedor">

    <div class="col-izquierda">
        <div class="circulo">
            <a href="https://albcassal-a.github.io/p3/">PROYECTO 1</a> 
        </div>
        <div class="circulo">
            <a href="https://albcassal-a.github.io/p6/indice.html">PROYECTO 2</a>
        </div>
        <div class="circulo">
            <a href="https://albcassal-a.github.io/p5/">PROYECTO 3</a>
        </div>
        <div class="circulo">
            <a href="https://albcassal-a.github.io/p6./">PROYECTO 4</a>
        </div>
    </div>

    <div class="col-derecha">
        <div class="circulo-central">
            <h2>ALBA CASTELLÓ</h2>
            <p>Marketing y publicidad - Grafica publicitaria</p> 
        </div>
    </div>

    <div class="col-derecha-lateral">
        <div class="circulo">
            <a href="https://albcassal-a.github.io/p9/">PROYECTO 5</a>
        </div>
        <div class="circulo">
            <a href="https://albcassal-a.github.io/processing/">PROYECTO 6</a>
        </div>
        <div class="circulo">
            <a href="https://www.figma.com/design/uqMBLRpxQALSp4iH3XtvSn/fromagenda?node-id=6-2&t=aHEJfL7mUmKBQ79G-1">PROYECTO 7</a>
        </div>
         <div class="circulo">
            <a href="https://www.figma.com/design/DFCqFMPr2Sx6igiccX8cs7/p11?node-id=12-77&t=Inu2CICHoxzSeEdy-1">PROYECTO 8</a>
        </div>
    </div>

</div>

</body>
</html>
